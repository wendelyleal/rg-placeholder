<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rollin' Green</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F5F5F5;
      min-height: 100dvh;
    }

    /* ── TOP BAR ── */
    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 100px;
      background: #0F3D2E;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.18);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 48px;
      overflow: visible;
      z-index: 100;
      /* smooth height + padding transitions */
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .top-bar.scrolled {
      height: 64px;
    }

    /* LEFT — maintenance copy */
    .bar-left {
      color: #fff;
    }
    .bar-left strong {
      display: block;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    .bar-left p {
      font-size: 13px;
      opacity: 0.72;
      margin-top: 4px;
      line-height: 1.4;
      /* fade out subtitle when scrolled */
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 40px;
      overflow: hidden;
    }
    .top-bar.scrolled .bar-left p {
      opacity: 0;
      max-height: 0;
      margin-top: 0;
    }

    /* CENTER — logo (overflows bar) */
    .bar-logo {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 10;
    }
    .bar-logo img {
      height: 148px;
      width: auto;
      display: block;
      position: relative;
      z-index: 10;
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: center top;
    }
    .top-bar.scrolled .bar-logo img {
      height: 90px;
    }

    /* RIGHT — shop copy */
    .bar-right {
      color: #fff;
      text-align: right;
    }
    .bar-right strong {
      display: block;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
    }
    .bar-right p {
      font-size: 13px;
      opacity: 0.72;
      margin-top: 4px;
      line-height: 1.4;
      transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                  max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 40px;
      overflow: hidden;
    }
    .top-bar.scrolled .bar-right p {
      opacity: 0;
      max-height: 0;
      margin-top: 0;
    }
    .bar-right .accent {
      color: #E53935;
      opacity: 1;
      font-style: normal;
    }

    /* ── PAGE OFFSET — push content below fixed bar ── */
    .page-offset {
      height: 160px; /* bar (100px) + logo overflow (~60px) */
    }

    /* ── DUTCHIE SECTION ── */
    .dutchie-section {
      background: #F5F5F5;
      min-height: calc(100dvh - 100px);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .top-bar {
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        justify-items: center;
        text-align: center;
        padding: 16px 20px 14px;
        gap: 10px;
        overflow: hidden;
      }

      /* On mobile: no shrink behaviour — keep it stacked & stable */
      .top-bar.scrolled {
        height: auto;
      }

      .bar-logo { order: -1; }

      .bar-logo img {
        height: 90px;
      }
      .top-bar.scrolled .bar-logo img {
        height: 90px;
      }

      .bar-left { text-align: center; }
      .bar-right { text-align: center; }

      /* hide subtitles on mobile — only bold lines shown */
      .bar-left p,
      .bar-right p { display: none; }

      .page-offset {
        height: 220px;
      }
    }
  </style>
</head>
<body>

  <header class="top-bar" id="topBar">
    <div class="bar-left">
      <strong>We're under maintenance.</strong>
      <p>We'll be back shortly, better than ever.</p>
    </div>

    <div class="bar-logo">
      <img src="rollingreen-logo-casino-rgb.svg" alt="Rollin' Green" />
    </div>

    <div class="bar-right">
      <strong>Until then, keep it Rollin'.</strong>
      <p>Shop Rollin' Green — where the <em class="accent">red carpet</em> is always rolled out for you.</p>
    </div>
  </header>

  <!-- pushes content below the fixed bar + overflowing logo -->
  <div class="page-offset" aria-hidden="true"></div>

  <section class="dutchie-section">
    <div>
      <script async="" id="dutchie--embed__script"
        src="https://dutchie.com/api/v2/embedded-menu/68719be58385bb9c85de5f26.js">
      </script>
    </div>
  </section>

  <script>
    const bar = document.getElementById('topBar');
    const THRESHOLD = 10;

    function onScroll() {
      if (window.scrollY > THRESHOLD) {
        bar.classList.add('scrolled');
      } else {
        bar.classList.remove('scrolled');
      }
    }

    window.addEventListener('scroll', onScroll, { passive: true });
  </script>

</body>
</html>
